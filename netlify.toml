<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Molghacity Freedom Relay · Active Proxy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0b1820 0%, #1a2f3a 100%);
            font-family: system-ui, 'Segoe UI', -apple-system, BlinkMacSystemFont, monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border-radius: 3rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            padding: 2.5rem 3rem;
            max-width: 750px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.2s ease;
        }
        .card:hover {
            transform: translateY(-4px);
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            background: linear-gradient(135deg, #ffffff, #b9e6f3);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.75rem;
        }
        .badge {
            display: inline-block;
            background: #2b7f5eaa;
            backdrop-filter: blur(4px);
            padding: 0.3rem 1rem;
            border-radius: 60px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #d4faf0;
            border: 0.5px solid #5fbb9e;
            margin-bottom: 1.8rem;
        }
        p {
            color: #d4e9f0;
            line-height: 1.5;
            margin-bottom: 1.5rem;
            font-size: 1rem;
        }
        .code-block {
            background: #07121aaa;
            border-left: 3px solid #3fa2d0;
            padding: 0.9rem 1.3rem;
            border-radius: 1.2rem;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 0.8rem;
            color: #bfe9ff;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-word;
            margin: 1.8rem 0;
        }
        hr {
            border: none;
            height: 1px;
            background: rgba(255, 255, 255, 0.2);
            margin: 1.8rem 0;
        }
        .footer {
            font-size: 0.75rem;
            text-align: center;
            color: #7799a8;
        }
        a {
            color: #7fcbe3;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        .status {
            background: #1f4d3e60;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 0.25rem 0.9rem;
            font-weight: 500;
            font-size: 0.8rem;
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body>
    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap;">
            <h1>⚡ molghacity · freedom relay</h1>
            <span class="status">● edge active</span>
        </div>
        <div class="badge">secure proxy · netlify edge functions</div>
        
        <p>
            <strong>molghacity-project-freedom</strong> is a lightweight, serverless HTTP relay that invisibly forwards 
            requests from your custom domain to any upstream backend. It preserves headers, client IP information, and 
            handles all HTTP methods with minimal latency.
        </p>

        <div class="code-block">
            # back-end target must be set via environment variable:<br>
            BACKEND_SERVER=https://your-upstream-server.com:443
        </div>

        <p>
            This edge function automatically intercepts every request (<code>/*</code>) and relays it to the 
            configured target domain. The relay works out-of-the-box with APIs, legacy web apps, and real‑time 
            services. All Netlify-specific headers are stripped, while standard proxy headers are preserved.
        </p>

        <hr>

        <div class="footer">
            🚀 deployed on netlify · <strong>molghacity freedom project</strong> — release 2.0<br>
            <a href="#" id="copyInfo" style="cursor:default; text-decoration: none;">⚙️ proxy service ready</a>
        </div>
    </div>
</body>
</html>
